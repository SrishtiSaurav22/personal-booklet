<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Srishti Saurav's Resume</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    font-family:'Poppins', sans-serif;
    background:linear-gradient(135deg,#ffd6e7,#ffc0cb);
    text-align:center;
}

header{
    padding:40px 20px 10px 20px;
}

h1{
    color:#8b004f;
    font-weight:600;
    font-size:42px;
    margin-bottom:10px;
}

.download-btn, .linkedin-btn{
    display:inline-block;
    margin:15px 8px 25px 8px;
    padding:12px 22px;
    color:white;
    text-decoration:none;
    border-radius:25px;
    font-weight:500;
    transition:0.2s;
}

/* Download button */
.download-btn{
    background:#8b004f;
}

.download-btn:hover{
    background:#b00066;
}

/* LinkedIn button */
.linkedin-btn{
    background:#0077b5;
}

.linkedin-btn:hover{
    background:#005582;
}

.resume-container{
    width:85%;
    max-width:900px;
    margin:auto;
    background:white;
    padding:15px;
    border-radius:10px;
    box-shadow:0 8px 25px rgba(0,0,0,0.15);
}

iframe{
    width:100%;
    height:1000px;
    border:none;
    border-radius:6px;
}

footer{
    margin-top:25px;
    padding:20px;
    color:#6b0040;
    font-size:14px;
}

</style>
</head>

<body>

<header>
<h1>Srishti Saurav's Resume</h1>

</header>

<div class="resume-container">
<iframe src="resume_Srishti_Saurav.pdf"></iframe>
</div>

<footer>
Made with GitHub Pages
</footer>

</body>
</html>
